# Prometheus 配置文件
global:
  scrape_interval: 15s          # 抓取间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: 'emotional-chat-monitor'

# Alertmanager 配置（可选）
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 规则文件（可选）
rule_files: []

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 后端服务监控
  - job_name: 'emotional-chat-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
